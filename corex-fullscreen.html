<!doctype html>

  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CORE X Fullscreen</title>
    <style>
      html,
      body {
        width: 100%;
        margin: 0;
        background: #f4f0ea;
      }

      body {
        overflow-x: hidden;
        color: #6b625d;
        font-family:
          Inter, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei",
          sans-serif;
      }

      .title-strip {
        width: 100%;
        min-height: 72px;
        display: grid;
        place-items: center;
        background: #e8dfd8;
        color: rgba(94, 89, 84, 0.72);
        font-size: 14px;
        letter-spacing: 0;
      }

      .screen {
        width: 100%;
        display: grid;
        place-items: center;
        background: #f4f0ea;
      }

      .screen img {
        width: 100%;
        height: auto;
        display: block;
        background: #f4f0ea;
      }

      @media (min-width: 1600px) {
        .screen img {
          width: min(100vw, 1920px);
        }
      }
    </style>
  </head>

    <header class="title-strip">CORE X 构象品牌视觉</header>
